<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics - Epitracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);">
    <div class="main-container">
        <header class="header-section">
            <img src="logo.png" alt="Logo" class="site-logo" onclick="window.location.href='index.html'" style="cursor:pointer;">
        </header>

        <div id="stats-content">
            </div>

        <button onclick="window.location.href='index.html'" class="buy-button" style="background:#64748b; margin-top:30px; width:100%;">
            <i class="fas fa-arrow-left"></i> Back to Search
        </button>
    </div>

    <script>
        const diseaseDatabase = {
            "covid-19": {
                title: "COVID-19 History",
                price: "20.00",
                history: [
                    { year: "2020", summary: "Global outbreak and initial lockdown phases." },
                    { year: "2022", summary: "Omicron variant dominance and surveillance." },
                    { year: "2025", summary: "Current 10,000+ record tracking." }
                ]
            },
            "cancer": {
                title: "Cancer Trends",
                price: "40.00",
                history: [
                    { year: "2021", summary: "Implementation of early screening data." },
                    { year: "2024", summary: "Breakthrough success rates in regional reports." }
                ]
            }
        };

        const params = new URLSearchParams(window.location.search);
        const query = params.get('disease') ? params.get('disease').toLowerCase() : "";
        const contentDiv = document.getElementById('stats-content');

        if (diseaseDatabase[query]) {
            let item = diseaseDatabase[query];
            let html = `<h2 style="color:#234E94;">${item.title}</h2><div class="history-list">`;
            
            item.history.forEach(h => {
                html += `
                <div class="history-item" style="border-left: 4px solid #216CE7; padding:15px; background:#fff; margin-bottom:10px; border-radius:5px;">
                    <strong style="color:#234E94;">Year ${h.year}</strong>
                    <p style="margin:5px 0 0; color:#555; font-size:14px;">${h.summary}</p>
                </div>`;
            });

            // THE BUY BUTTON ON SECOND PAGE
            html += `</div>
            <div style="background:#f8fafc; padding:20px; border-radius:10px; margin-top:20px; border:1px dashed #216CE7; text-align:center;">
                <p style="font-weight:bold; color:#234E94;">Full Detailed Report Available</p>
                <button onclick="window.location.href='pay.html?product=${encodeURIComponent(item.title)}&price=${item.price}'" class="buy-button" style="width:100%; margin-top:10px;">
                    <i class="fas fa-shopping-cart"></i> Buy Full PDF Report ($${item.price})
                </button>
            </div>`;
            
            contentDiv.innerHTML = html;
        } else {
            contentDiv.innerHTML = `
            <div style="text-align:center; padding:40px;">
                <h2 style="color:#234E94;">Data Not Found</h2>
                <p style="color:#64748b;">We don't have statistics for "${query}" yet.</p>
                <a href="mailto:epitracker29@gmail.com?subject=Special Order: ${query}" class="buy-button" style="display:inline-block; text-decoration:none; margin-top:20px; background:#d97706;">
                   Order via Gmail
                </a>
            </div>`;
        }
    </script>
</body>
</html>
