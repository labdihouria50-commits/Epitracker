<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Payment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <h2>Complete Your Payment</h2>
        <p>You are purchasing: <strong id="display-name">PDF Report</strong></p>
        <p>Total: <strong id="display-price">$0.00</strong></p>

        <div class="payment-methods">
            <div class="method-card">
                <strong>Algerie Poste (CCP)</strong>
                <p>Account: 0012345678 / 99</p>
            </div>
            <div class="method-card">
                <strong>Bybit (USDT)</strong>
                <p>Address: [Your_Wallet_Address]</p>
            </div>
        </div>

        <form action="https://formspree.io/f/xqegddaw" method="POST" enctype="multipart/form-data">
            <input type="hidden" name="Item_Name" id="hidden-name">
            <input type="hidden" name="Item_Price" id="hidden-price">

            <div class="input-group">
                <input type="text" name="name" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <input type="email" name="email" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <label>Upload Receipt Image:</label>
                <input type="file" name="receipt" accept="image/*" required>
            </div>
            <button type="submit" class="buy-button">Send Payment Proof</button>
        </form>
    </div>

    <script>
        // Get product details from the URL
        const params = new URLSearchParams(window.location.search);
        document.getElementById('display-name').innerText = params.get('product');
        document.getElementById('display-price').innerText = "$" + params.get('price');
        document.getElementById('hidden-name').value = params.get('product');
        document.getElementById('hidden-price').value = params.get('price');
    </script>
</body>
</html>
            <div class="input-group">
                <input type="email" name="customer_email" placeholder="Enter Your Email" required>
            </div>
            
            <div class="input-group">
                <label style="display:block; margin-bottom: 5px; color: #666;">Upload Screenshot/Receipt:</label>
                <input type="file" name="payment_proof" accept="image/*" required>
            </div>

            <button type="submit" class="main-btn">Confirm & Send Proof</button>
        </form>
        
        <p style="text-align:center; font-size: 12px; color: #888; margin-top: 20px;">
            We will verify the transfer and email your files within 24 hours.
        </p>
    </div>

</body>
</html>
