<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Marketplace - Algeria 2025</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <div class="logo-section">
            <div class="logo-stack">
                <span class="logo-bar"></span>
                <span class="logo-bar"></span>
                <span class="logo-bar"></span>
            </div>
            <div class="logo-text">DATA<br>MARKETPLACE</div>
        </div>

        <div class="product-grid">
            <div class="info-left">
                <h2>COVID-19 Statistics<br>in Algeria 2025</h2>
                <p class="records">10,000 Records</p>
                <div class="price">$79.00</div>
                
                <p class="label">Payment Options</p>
                <div class="badges">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" alt="Visa" class="badge-img">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" alt="Mastercard" class="badge-img">
                </div>
                <div class="badges">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal" class="badge-img">
                </div>
            </div>

            <div class="action-right">
                <p class="label">Ready to purchase?</p>
                <p class="sub-text">Click the button below to get our CCP and Bybit payment details.</p>
                <button onclick="window.location.href='pay.html'" class="main-btn">Buy Data</button>
            </div>
        </div>

        <div class="footer-note">
            After payment, the data will be delivered directly to your email
        </div>
    </div>

</body>
</html>
